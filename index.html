<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMBRAL — Llanura de los Colosos (WebGL / WebXR)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0d1020; }
  canvas { display: block; }
  #hud {
    position: fixed; left: 20px; bottom: 20px; z-index: 10;
    color: #aebbdd; font: 400 12px/1.6 "Courier New", monospace;
    letter-spacing: 0.08em; pointer-events: none; user-select: none;
  }
  #hud h1 { font-size: 13px; font-weight: 400; margin: 0 0 4px; color: #dfe6ff; }
  #hud p { margin: 0; opacity: 0.7; }
</style>
</head>
<body>
<div id="hud">
  <h1>UMBRAL · zona 2 — llanura de los colosos</h1>
  <p>arrastra para mirar · rueda para acercar · botón VR si tu dispositivo soporta WebXR</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { VRButton } from 'three/addons/webxr/VRButton.js';

/* ---------- renderer: la mitad del "look Unreal" vive aquí ---------- */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;   // curva fílmica tipo UE
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x141a30, 0.0075);      // niebla exponencial = escala

/* ---------- cielo: gradiente en shader, sin texturas ---------- */
const sky = new THREE.Mesh(
  new THREE.SphereGeometry(900, 24, 16),
  new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      top:    { value: new THREE.Color(0x1b2145) },
      mid:    { value: new THREE.Color(0x2e3a6e) },
      bottom: { value: new THREE.Color(0x141a30) }
    },
    vertexShader: `
      varying vec3 vPos;
      void main() {
        vPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform vec3 top; uniform vec3 mid; uniform vec3 bottom;
      varying vec3 vPos;
      void main() {
        float h = normalize(vPos).y;
        vec3 c = h > 0.0 ? mix(mid, top, pow(h, 0.6)) : mix(mid, bottom, pow(-h, 0.5));
        gl_FragColor = vec4(c, 1.0);
      }`
  })
);
scene.add(sky);

/* ---------- luces ---------- */
const sun = new THREE.DirectionalLight(0xbfd0ff, 2.4);
sun.position.set(80, 160, -60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -200; sun.shadow.camera.right = 200;
sun.shadow.camera.top = 200;   sun.shadow.camera.bottom = -200;
sun.shadow.camera.far = 500;
sun.shadow.bias = -0.0004;
scene.add(sun);

scene.add(new THREE.HemisphereLight(0x3a4680, 0x101422, 0.7));

/* ---------- suelo ---------- */
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(500, 48),
  new THREE.MeshStandardMaterial({ color: 0x1c2236, roughness: 1.0, metalness: 0.0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

/* ---------- monolitos lowpoly con franjas emisivas ---------- */
const monolithMat = new THREE.MeshStandardMaterial({
  color: 0x2c3552, roughness: 0.92, metalness: 0.05, flatShading: true
});
const stripMat = new THREE.MeshStandardMaterial({
  color: 0x0a0f1e, emissive: 0x53d7ff, emissiveIntensity: 3.5,
  roughness: 0.4, metalness: 0.0
});

const rng = mulberry(42);
function mulberry(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

const monoliths = new THREE.Group();
for (let i = 0; i < 26; i++) {
  const angle = rng() * Math.PI * 2;
  const dist = 55 + rng() * 260;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;
  const w = 8 + rng() * 16;
  const h = 90 + rng() * 220;

  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, w * (0.7 + rng() * 0.6)), monolithMat);
  m.position.set(x, h / 2, z);
  m.rotation.y = rng() * Math.PI;
  m.rotation.z = (rng() - 0.5) * 0.05;
  m.castShadow = true;
  m.receiveShadow = true;
  monoliths.add(m);

  if (rng() > 0.45) {
    const strip = new THREE.Mesh(new THREE.BoxGeometry(w * 0.08, h * (0.3 + rng() * 0.4), 0.4), stripMat);
    strip.position.set(
      x + Math.cos(m.rotation.y) * (w / 2 + 0.25),
      h * (0.35 + rng() * 0.3),
      z + Math.sin(m.rotation.y) * (w / 2 + 0.25)
    );
    strip.rotation.y = m.rotation.y;
    monoliths.add(strip);
  }
}
scene.add(monoliths);

/* ---------- orbe emisivo (guía del recorrido) ---------- */
const orb = new THREE.Mesh(
  new THREE.IcosahedronGeometry(2.2, 1),
  new THREE.MeshStandardMaterial({
    color: 0x1a0f00, emissive: 0xffb347, emissiveIntensity: 4.0,
    roughness: 0.3, flatShading: true
  })
);
orb.position.set(0, 14, -80);
scene.add(orb);

const orbLight = new THREE.PointLight(0xffb347, 120, 90, 2);
orb.add(orbLight);

/* ---------- god rays falsos: cilindros aditivos con alphaMap ---------- */
function makeRayTexture() {
  const c = document.createElement('canvas');
  c.width = 4; c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, 128);
  g.addColorStop(0.0, 'rgba(255,255,255,0.9)');
  g.addColorStop(0.6, 'rgba(255,255,255,0.25)');
  g.addColorStop(1.0, 'rgba(255,255,255,0.0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 4, 128);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const rayTex = makeRayTexture();
const rayMat = new THREE.MeshBasicMaterial({
  color: 0xcfe0ff, alphaMap: rayTex, transparent: true, opacity: 0.14,
  blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
  fog: false
});
const rays = new THREE.Group();
for (let i = 0; i < 6; i++) {
  const ray = new THREE.Mesh(new THREE.CylinderGeometry(3 + rng() * 3, 12 + rng() * 8, 240, 10, 1, true), rayMat);
  ray.position.set(-140 + rng() * 280, 120, -190 + rng() * 220);
  ray.rotation.z = 0.28;
  ray.rotation.x = -0.08;
  rays.add(ray);
}
scene.add(rays);

/* ---------- polvo flotante ---------- */
const DUST = 900;
const dustPos = new Float32Array(DUST * 3);
for (let i = 0; i < DUST; i++) {
  dustPos[i * 3]     = (rng() - 0.5) * 400;
  dustPos[i * 3 + 1] = rng() * 120;
  dustPos[i * 3 + 2] = (rng() - 0.5) * 400;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
  color: 0x9fb4ff, size: 0.7, transparent: true, opacity: 0.45,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
}));
scene.add(dust);

/* ---------- cámara y controles ---------- */
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 1.7, 46);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 30, -70);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 10;
controls.maxDistance = 260;
controls.maxPolarAngle = Math.PI * 0.52;

/* ---------- post-proceso: bloom selectivo por umbral ---------- */
let composer = null;
function buildComposer() {
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.55,   /* strength */
    0.5,    /* radius */
    0.82    /* threshold: solo emisivos brillan */
  );
  composer.addPass(bloom);
  composer.addPass(new OutputPass());
}
buildComposer();

/* ---------- loop ---------- */
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime();

  orb.position.y = 14 + Math.sin(t * 0.8) * 1.6;
  orb.rotation.y = t * 0.4;
  orb.material.emissiveIntensity = 3.6 + Math.sin(t * 2.3) * 0.7;

  const p = dust.geometry.attributes.position;
  for (let i = 0; i < DUST; i++) {
    let y = p.getY(i) + 0.015;
    if (y > 120) y = 0;
    p.setY(i, y);
  }
  p.needsUpdate = true;

  rays.children.forEach((r, i) => {
    r.material.opacity = 0.11 + Math.sin(t * 0.5 + i * 1.7) * 0.035;
  });

  controls.update();

  /* En XR el composer clásico no funciona por render estéreo:
     se renderiza directo (el emisivo + ACES sostienen el look). */
  if (renderer.xr.isPresenting) {
    renderer.render(scene, camera);
  } else {
    composer.render();
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
